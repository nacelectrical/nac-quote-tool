// ── Outdoor Unit Image ────────────────────────────────────────────────────────
function BrandImgs({ brandId, brandName }) {
  const [loaded, setLoaded] = useState(false);
  const [failed, setFailed] = useState(false);
  const src = OUTDOOR_IMGS[brandId];
  if(!src) return null;
  return (
    <div style={{ textAlign:"center", marginBottom:8 }}>

      {!failed ? (
        <>
          <img src={src} alt={brandName+" outdoor unit"}
            onLoad={()=>setLoaded(true)} onError={()=>setFailed(true)}
            style={{ maxWidth:"100%", height:100, objectFit:"contain", borderRadius:8, background:"#f8f9fb", padding:4, display:loaded?"block":"none", margin:"0 auto" }} />
          {!loaded && <div style={{ height:100, background:"#f0f4ff", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", color:"#bbb", fontSize:11 }}>{brandName}</div>}
        </>
      ) : (
        <div style={{ height:100, background:"#f0f4ff", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", color:"#bbb", fontSize:11 }}>{brandName} Outdoor Unit</div>
      )}
    </div>
  );
}

// ── Sig Pad ──────────────────────────────────────────────────────────────────
function SigPad({ label, onSave }) {
  const ref = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [has, setHas] = useState(false);

  function pos(e, c) {
    const r = c.getBoundingClientRect();
    const sx = c.width / r.width, sy = c.height / r.height;
    if (e.touches) return [(e.touches[0].clientX-r.left)*sx, (e.touches[0].clientY-r.top)*sy];
    return [(e.clientX-r.left)*sx, (e.clientY-r.top)*sy];
  }
  function start(e) { e.preventDefault(); const c=ref.current,ctx=c.getContext("2d"),[x,y]=pos(e,c); ctx.beginPath(); ctx.moveTo(x,y); setDrawing(true); }
  function move(e) { if(!drawing) return; e.preventDefault(); const c=ref.current,ctx=c.getContext("2d"),[x,y]=pos(e,c); ctx.lineTo(x,y); ctx.strokeStyle="#111"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.stroke(); setHas(true); }
  function end() { setDrawing(false); }
  function clear() { ref.current.getContext("2d").clearRect(0,0,ref.current.width,ref.current.height); setHas(false); onSave(""); }

  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ ...LBL, marginBottom:8 }}>{label}</label>
      <div style={{ border:"1.5px solid #252545", borderRadius:10, background:"#f9f9f9", overflow:"hidden", position:"relative" }}>
        <canvas ref={ref} width={680} height={120} style={{ width:"100%", height:120, display:"block", touchAction:"none" }}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
        <div style={{ position:"absolute", top:8, right:8, display:"flex", gap:6 }}>
          <button onClick={clear} style={{ background:"#ff444433", color:"#ff6666", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>Clear</button>
          {has && <button onClick={()=>onSave(ref.current.toDataURL())} style={{ background:`${B}33`, color:B, border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>Save ✓</button>}
        </div>
        {!has && <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", color:"#bbb", fontSize:13, pointerEvents:"none" }}>Sign here</div>}
      </div>
    </div>
  );
}

// ── Price Setup ───────────────────────────────────────────────────────────────
function PriceSetup({ brands, controllers, onSave, onBack }) {
  const [lb, setLb] = useState(JSON.parse(JSON.stringify(brands)));
  const [lc, setLc] = useState(JSON.parse(JSON.stringify(controllers)));
  const [ab, setAb] = useState(lb[0]?.id || "");
  const [saved, setSaved] = useState(false);

  const setMPrice = (bid,mid,v) => setLb(p=>p.map(b=>b.id===bid?{...b,models:b.models.map(m=>m.id===mid?{...m,price:v}:m)}:b));
  const setCPrice = (cid,v) => setLc(p=>p.map(c=>c.id===cid?{...c,price:v}:c));

  async function save() {
    try {
      await window.storage.set("nac_brands_v4", JSON.stringify(lb));
      await window.storage.set("nac_ctrl_v4", JSON.stringify(lc));
      setSaved(true); setTimeout(()=>setSaved(false),2000);
      onSave(lb, lc);
    } catch(e) { console.error(e); }
  }

  const brand = lb.find(b=>b.id===ab);
  const priced = brand?.models.filter(m=>m.price).length || 0;

  return (
    <div style={{ padding:"20px 16px", maxWidth:720, margin:"0 auto" }}>
      <h2 style={{ margin:"0 0 6px", fontSize:19, fontWeight:800 }}>Set Your Prices</h2>
      <p style={{ color:"#555", fontSize:13, marginBottom:20 }}>Enter your price (ex GST) next to each model. Only priced models appear in quotes. Saves permanently.</p>

      <div style={{ background:"#16162e", borderRadius:12, padding:16, border:`1px solid ${Y}44`, marginBottom:14 }}>
        <div style={{ fontSize:12, fontWeight:700, color:Y, marginBottom:12 }}>Controllers</div>
        {lc.map(c => (
          <div key={c.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
            <div style={{ flex:1, fontSize:13, fontWeight:600 }}>{c.name}</div>
            <span style={{ color:"#555" }}>$</span>
            <input type="number" placeholder="Price ex GST" value={c.price} onChange={e=>setCPrice(c.id,e.target.value)}
              style={{ ...inp({ width:130, padding:"7px 10px", fontSize:13, border:c.price?`1px solid ${Y}55`:"1px solid #252545" }) }} />
          </div>
        ))}
      </div>

      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
        {lb.map(b => {
          const cnt = b.models.filter(m=>m.price).length;
          return (
            <button key={b.id} onClick={()=>setAb(b.id)} style={{ padding:"8px 14px", borderRadius:20, border:"none", cursor:"pointer", fontSize:12, fontWeight:700, background:ab===b.id?Y:"#16162e", color:ab===b.id?"#0c0c24":"#888" }}>
              {b.name} {cnt>0 && <span style={{ opacity:.7 }}>({cnt})</span>}
            </button>
          );
        })}
      </div>

      {brand && (
        <div style={{ background:"#16162e", borderRadius:12, padding:16, border:"1px solid #252545" }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:B }}>{brand.name}</div>
            <div style={{ fontSize:11, color:"#444" }}>{priced}/{brand.models.length} priced</div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 55px 55px 115px", gap:6, padding:"4px 8px", marginBottom:6 }}>
            {["Model","kW","Phase","Price ex GST"].map(h=><div key={h} style={{ fontSize:10, fontWeight:700, color:"#333", textTransform:"uppercase", letterSpacing:.4 }}>{h}</div>)}
          </div>
          <div style={{ display:"grid", gap:5, maxHeight:400, overflowY:"auto" }}>
            {brand.models.map(m => (
              <div key={m.id} style={{ display:"grid", gridTemplateColumns:"1fr 55px 55px 115px", gap:6, alignItems:"center", background:m.price?"#101e10":"#0c0c24", border:m.price?"1px solid #2a4a2a":"1px solid #1a1a30", borderRadius:7, padding:"7px 8px" }}>
                <div style={{ fontSize:12, fontWeight:600, color:m.price?"#ccc":"#666" }}>{m.name}</div>
                <div style={{ background:"#0c0c24", borderRadius:6, padding:"3px 8px", fontSize:11, color:Y, fontWeight:700 }}>{m.kw}</div>
                <div style={{ background:"#0c0c24", borderRadius:6, padding:"3px 8px", fontSize:11, color:"#666" }}>{m.phase}</div>
                <div style={{ position:"relative" }}>
                  <span style={{ position:"absolute", left:8, top:"50%", transform:"translateY(-50%)", color:"#555", fontSize:13, pointerEvents:"none" }}>$</span>
                  <input type="number" placeholder="—" value={m.price} onChange={e=>setMPrice(brand.id,m.id,e.target.value)}
                    style={{ ...inp({ paddingLeft:20, padding:"6px 8px 6px 20px", fontSize:13, border:m.price?`1px solid ${Y}55`:"1px solid #252545" }) }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ display:"flex", gap:10, marginTop:16 }}>
        {onBack && <button onClick={onBack} style={{ ...btnGhost }}>← Back</button>}
        <button onClick={save} style={{ ...btnYellow, flex:1 }}>{saved ? "✓ Saved!" : "Save All Prices"}</button>
      </div>
    </div>
  );
}

                  {INCLUSIONS.map((item,i)=>(
                    <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:8, fontSize:12, color:"#333", marginBottom:4 }}>
                      <span style={{ color:"#2a8a2a", fontWeight:700, flexShrink:0 }}>✓</span><span>{item}</span>
                    </div>
                  ))}
                </div>

                {/* Brochure links */}
                {(chosen!==null&&opts[chosen]?.brand || selCtrl==="at5") && (
                  <div style={{ background:"#f0f4ff", borderRadius:8, padding:"10px 14px", borderLeft:`3px solid ${B}`, marginBottom:12 }}>
                    <div style={{ fontSize:9, fontWeight:700, color:"#aaa", textTransform:"uppercase", letterSpacing:.5, marginBottom:6 }}>Product Information</div>
                    {chosen!==null&&opts[chosen]?.brand && BRAND_URL[opts[chosen].brand] && (
                      <a href={BRAND_URL[opts[chosen].brand]} target="_blank" rel="noopener noreferrer" style={{ display:"block", fontSize:12, color:B, textDecoration:"none", fontWeight:600, marginBottom:4 }}>
                        🔗 {pricedBrands.find(b=>b.id===opts[chosen].brand)?.name} Ducted Systems
                      </a>
                    )}
                    {selCtrl==="at5" && (
                      <a href="https://www.airtouch.net.au/wp-content/uploads/2022/08/AirTouch-5-Brochure.pdf" target="_blank" rel="noopener noreferrer" style={{ display:"block", fontSize:12, color:B, textDecoration:"none", fontWeight:600 }}>
                        🔗 Airtouch 5 Brochure (PDF)
                      </a>
                    )}
                  </div>
                )}

                {notes && (
                  <div style={{ background:"#fffdf0", borderRadius:8, padding:"10px 12px", borderLeft:`3px solid ${Y}`, marginBottom:12 }}>
                    <div style={{ fontSize:9, fontWeight:700, color:"#aaa", textTransform:"uppercase", marginBottom:4 }}>Notes & Scope</div>
                    <div style={{ fontSize:12, color:"#444", lineHeight:1.6 }}>{notes}</div>
                  </div>
                )}

                <div style={{ marginTop:12, fontSize:10, color:"#ccc", textAlign:"center", lineHeight:1.7 }}>
                  All prices exclude GST unless stated. Quote valid for {validDays} days from issue date.<br/>
                  Work performed by licensed Queensland electricians & refrigeration technicians.<br/>
                  Subject to NAC Electrical Air & Refrigeration standard terms and conditions.
                </div>
              </div>
            </div>

            {/* Actions */}
            <div style={{ display:"grid", gap:10 }}>
              {!chosenModel && filledOpts.length>0 && (
                <div style={{ background:"#1a1a0a", border:`1px solid ${Y}44`, borderRadius:8, padding:"10px 14px", textAlign:"center", fontSize:12, color:Y }}>
                  ☝ Ask the client to choose a system above before signing
                </div>
              )}
              <button onClick={()=>setStep(4)} style={{ ...btnYellow, opacity:chosenModel?1:.4, cursor:chosenModel?"pointer":"not-allowed" }} disabled={!chosenModel}>✍ Sign & Accept On-Site</button>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {emailSending ? (
                <button style={{ ...btnBlue, background:"linear-gradient(135deg,#1a6e2e,#0f4d1f)", opacity:0.7 }}>⏳ Creating Draft...</button>
              ) : emailSent ? (
                <button style={{ ...btnBlue, background:"linear-gradient(135deg,#1a6e2e,#0f4d1f)" }}>✅ Draft Created!</button>
              ) : (
                <button onClick={openEmail} style={{ ...btnBlue, background:"linear-gradient(135deg,#1a6e2e,#0f4d1f)" }}>📧 Email Quote</button>
              )}
                <button onClick={openSMS} style={{ ...btnBlue, background:"linear-gradient(135deg,#1a4e6e,#0f2d4d)" }}>💬 SMS Client</button>
              </div>
              <button onClick={()=>window.print()} style={{ ...btnGhost, width:"100%", textAlign:"center" }}>🖨 Print / Save PDF</button>
              <button onClick={()=>setStep(2)} style={{ ...btnGhost, width:"100%", textAlign:"center" }}>← Edit</button>
            </div>
          </div>
        )}

        {/* ── STEP 4: SIGN ── */}
        {step===4 && (
          <div>
            <h2 style={{ margin:"0 0 18px", fontSize:19, fontWeight:800 }}>Sign & Accept</h2>
            <div style={{ background:"#16162e", borderRadius:12, padding:16, border:`1px solid ${B}44`, marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div>
                  <div style={{ fontWeight:700, fontSize:15 }}>{qNum}</div>
                  <div style={{ color:"#555", fontSize:12 }}>{client.name} — {jobDesc}</div>
                  {chosenBrand && <div style={{ color:Y, fontSize:12, fontWeight:600, marginTop:3 }}>✓ {chosenBrand.name} {chosenModel?.name}</div>}
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ color:Y, fontWeight:800, fontSize:22 }}>{fmt(total)}</div>
                  <div style={{ color:"#555", fontSize:11 }}>inc GST</div>
                </div>
              </div>
              {lineItems.map((item,i)=>(
                <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#666", paddingTop:6, borderTop:"1px solid #1a1a30" }}>
                  <span>{item.label}</span><span style={{ fontWeight:600, color:"#aaa" }}>{fmt(item.price*item.qty)}</span>
                </div>
              ))}
            </div>

            <div style={{ background:"#16162e", border:`1px solid ${Y}33`, borderRadius:12, padding:16, marginBottom:16 }}>
              <label style={{ display:"flex", alignItems:"flex-start", gap:12, cursor:"pointer" }}>
                <input type="checkbox" checked={accepted} onChange={e=>{ setAccepted(e.target.checked); if(e.target.checked) setAcceptedTime(new Date().toLocaleString("en-AU")); }}
                  style={{ width:22, height:22, marginTop:2, accentColor:Y, flexShrink:0 }} />
                <span style={{ fontSize:13, color:"#bbb", lineHeight:1.7 }}>
                  I, <strong style={{ color:"#fff" }}>{client.name||"the client"}</strong>, accept this quote for <strong style={{ color:Y }}>{fmt(total)}</strong> (inc GST) and authorise NAC Electrical Air & Refrigeration (ABN: 97 636 392 982) to proceed with the described works.
                </span>
              </label>
            </div>

            <SigPad label="Customer Signature" onSave={setCustSig} />
            <SigPad label="NAC Technician Signature" onSave={setTechSig} />

            <div style={{ background:"#16162e", borderRadius:10, padding:14, marginBottom:16 }}>
              <div style={{ fontSize:12, color:"#555" }}>
                <div>📅 <span style={{ color:"#aaa" }}>Date:</span> <strong style={{ color:"#ccc" }}>{new Date().toLocaleDateString("en-AU")}</strong></div>
                {acceptedTime && <div style={{ marginTop:4 }}>🕐 <span style={{ color:"#aaa" }}>Accepted:</span> <strong style={{ color:"#ccc" }}>{acceptedTime}</strong></div>}
              </div>
            </div>

            {accepted && custSig && (
              <div style={{ background:"#071a07", border:"1px solid #2a4a2a", borderRadius:10, padding:"12px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ fontSize:24 }}>✅</span>
                <div><div style={{ fontWeight:700, color:"#4ade80", fontSize:14 }}>Quote Accepted</div><div style={{ color:"#555", fontSize:12 }}>Signed by {client.name} on {acceptedTime}</div></div>
              </div>
            )}

            <div style={{ display:"grid", gap:10 }}>
              <button onClick={()=>{ saveQuoteToHistory(); window.print(); }} style={{ ...btnYellow, opacity:(accepted&&custSig)?1:.4, cursor:(accepted&&custSig)?"pointer":"not-allowed" }} disabled={!accepted||!custSig}>🖨 Print Accepted Quote</button>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {emailSending ? (
                <button style={{ ...btnBlue, background:"linear-gradient(135deg,#1a6e2e,#0f4d1f)", opacity:0.7 }}>⏳ Creating Draft...</button>
              ) : emailSent ? (
                <button style={{ ...btnBlue, background:"linear-gradient(135deg,#1a6e2e,#0f4d1f)" }}>✅ Draft Created!</button>
              ) : (
                <button onClick={openEmail} style={{ ...btnBlue, background:"linear-gradient(135deg,#1a6e2e,#0f4d1f)" }}>📧 Email Quote</button>
              )}
                <button onClick={openSMS} style={{ ...btnBlue, background:"linear-gradient(135deg,#1a4e6e,#0f2d4d)" }}>💬 SMS Client</button>
              </div>
              <button onClick={()=>setStep(3)} style={{ ...btnGhost, width:"100%", textAlign:"center" }}>← Back to Quote</button>
              <button onClick={reset} style={{ ...btnGhost, width:"100%", textAlign:"center" }}>Start New Quote</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
